<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Slap & Tickle (Adult Party Game)</title>
    <style>
        :root {
            --bg-color: #0f0c1b;
            --card-color: #1d1836;
            --accent-color: #ff007f;
            --text-color: #ffffff;
            --correct-color: #00ff66;
            --pass-color: #ff3333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: absolute;
            top: 0;
            left: 0;
        }

        .active {
            display: flex;
        }

        h1 {
            font-size: 3rem;
            color: var(--accent-color);
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(255, 0, 127, 0.6);
            font-weight: 900;
            letter-spacing: 1px;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: #b0a8d3;
            max-width: 80%;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 0, 127, 0.4);
            transition: transform 0.1s ease;
            margin-top: 10px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .word-display {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            word-break: break-word;
            padding: 0 20px;
            margin-bottom: 20px;
            max-width: 90%;
        }

        .timer {
            font-size: 2rem;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 20px;
            border-radius: 20px;
            margin-bottom: 40px;
        }

        .instruction-hint {
            position: absolute;
            bottom: 20px;
            font-size: 1rem;
            opacity: 0.6;
            color: #ffffff;
        }

        .flash-correct { background-color: #004d1f !important; }
        .flash-pass { background-color: #4d0000 !important; }

        .score-title {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .score-num {
            font-size: 5rem;
            font-weight: bold;
            color: var(--correct-color);
            margin-bottom: 30px;
        }

        @media (orientation: portrait) {
            .portrait-warning {
                display: flex;
                background: var(--bg-color);
                z-index: 999;
            }
        }

        @media (orientation: landscape) {
            .portrait-warning {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- Orientation Screen -->
    <div class="screen portrait-warning active">
        <h1>🙃 Flip Your Phone!</h1>
        <p>Slap & Tickle is played horizontally. Turn your device sideways to begin.</p>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="screen">
        <h1>Slap & Tickle</h1>
        <p>The Adult Heads-Up Game. Tilt down to score, tilt up to pass. Place the phone against your forehead!</p>
        <button class="btn" onclick="requestPermissionAndStart()">START ROUND</button>
    </div>

    <!-- Gameplay Screen -->
    <div id="game-screen" class="screen" style="background-color: var(--card-color);">
        <div class="timer" id="timer-display">60</div>
        <div class="word-display" id="word-display">READY?</div>
        <div class="instruction-hint">Tilt Down = Slap (Score) | Tilt Up = Tickle (Pass)</div>
    </div>

    <!-- Score Screen -->
    <div id="score-screen" class="screen">
        <div class="score-title">Round Over! Total Score:</div>
        <div class="score-num" id="final-score">0</div>
        <button class="btn" onclick="showStartScreen()">PLAY AGAIN</button>
    </div>

        // Handles secure motion permission flags required by modern browsers (especially iOS Safari)
        function requestPermissionAndStart() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {

// Processing landscape tilt angles (Forehead facing outward)
function handleOrientation(event) {
if (isTiltLocked) return;

let targetAngle = window.orientation === 90 ? event.gamma : -event.gamma;
// Alternative fallback evaluation check if gamma behaves irregularly across different OS layers
if(Math.abs(event.beta) < 30) {
targetAngle = event.gamma;

triggerAction('correct');
}
// Tilt Up to Pass (Tickle)

triggerAction('pass');
}
}
function triggerAction(action) {
isTiltLocked = true;
const gameScreen = document.getElementById('game-screen');
if (action === 'correct') {
score++;
gameScreen.classList.add('flash-correct');
document.getElementById('word-display').innerText = "SLAP! (Score)";
} else {
gameScreen.classList.add('flash-pass');
document.getElementById('word-display').innerText = "TICKLE! (Pass)";
}
// Lock controls briefly during visual flash transition
setTimeout(() => {
gameScreen.classList.remove('flash-correct', 'flash-pass');
nextWord();
// Clear orientation lock once user returns phone to the baseline vertical plane
setTimeout(() => { isTiltLocked = false; }, 400);
}, 800);
}
function endGame() {
clearInterval(timerInterval);
window.removeEventListener('deviceorientation', handleOrientation);
document.getElementById('final-score').innerText = score;
showScreen('score-screen');
}
// Initialize view state on launch
window.onload = () => {
showStartScreen();
};
