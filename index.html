<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --bg-color: #0f0c1b;
            --card-color: #1d1836;
            --accent-color: #ff007f;
            --text-color: #ffffff;
            --correct-color: #00ff66;
            --pass-color: #ff3333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: absolute;
            top: 0;
            left: 0;
        }

        .active {
            display: flex;
        }

        h1 {
            font-size: 3rem;
            color: var(--accent-color);
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(255, 0, 127, 0.6);
            font-weight: 900;
            letter-spacing: 1px;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: #b0a8d3;
            max-width: 80%;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 0, 127, 0.4);
            transition: transform 0.1s ease;
            margin-top: 10px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .word-display {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            word-break: break-word;
            padding: 0 20px;
            margin-bottom: 20px;
            max-width: 90%;
        }

        .timer {
            font-size: 2rem;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 20px;
            border-radius: 20px;
            margin-bottom: 40px;
        }

        .instruction-hint {
            position: absolute;
            bottom: 20px;
            font-size: 1rem;
            opacity: 0.6;
            color: #ffffff;
        }

        .flash-correct { background-color: #004d1f !important; }
        .flash-pass { background-color: #4d0000 !important; }
        .flash-tilt { background-color: #3b3166 !important; }

        .score-title {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .score-num {
            font-size: 5rem;
            font-weight: bold;
            color: var(--correct-color);
            margin-bottom: 30px;
        }

        @media (orientation: portrait) {
            .portrait-warning {
                display: flex;
                background: var(--bg-color);
                z-index: 999;
            }
        }

        @media (orientation: landscape) {
            .portrait-warning {
                display: none;
            }
        }
    </style>
</head>

function startGame() {

function handleOrientation(event) {
